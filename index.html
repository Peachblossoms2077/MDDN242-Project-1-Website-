<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ha Dao • User Experience Designer • Portfolio</title>

  <!-- Describe your page — shows up in search results and browser tabs -->
  <meta name="description" content="A food menu-style portfolio with flipping pages.">

  <!-- Your styles -->
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Keyboard users need to see where focus is */
    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1 class="site-title">
      <span class="site-title__name">Ha Dao</span>
      <span class="site-title__dot" aria-hidden="true">•</span>
      <span class="site-title__role">User Experience Designer</span>
      <span class="site-title__dot" aria-hidden="true">•</span>
      <span class="site-title__portfolio">Portfolio</span>
    </h1>
    <p class="site-subtitle">A food menu of my projects — each project is a dish.</p>
  </header>

  <main id="main-content" class="menu-stage">
    <button class="nav-arrow nav-arrow--left" id="prevBtn" type="button" aria-label="Previous page"></button>

    <section class="menu-wrap" aria-label="Portfolio menu">
      <div class="book-perspective" aria-live="polite">
        <div class="book" id="book" role="group" aria-roledescription="booklet menu"></div>
      </div>
      <p class="menu-hint" id="menuHint">Use the arrows (or ← / →) to turn pages.</p>
    </section>

    <button class="nav-arrow nav-arrow--right" id="nextBtn" type="button" aria-label="Next page"></button>
  </main>

  <footer>
    <small>&copy; <span id="year"></span> Ha Dao</small>
  </footer>

  <!-- Your scripts -->
  <script src="script.js"></script>

</body>
</html>
